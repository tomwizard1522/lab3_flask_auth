{% extends 'base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="my-5 text-center">Вход в систему</h1>

        <div class="card">
            <div class="card-body">
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Логин</label>
                        <input type="text"
                               class="form-control"
                               id="username"
                               name="username"
                               required
                               autofocus>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password"
                               class="form-control"
                               id="password"
                               name="password"
                               required>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox"
                               class="form-check-input"
                               id="remember"
                               name="remember">
                        <label class="form-check-label" for="remember">
                            Запомнить меня
                        </label>
                        <div class="form-text text-muted">
                            Если отмечено, сессия сохранится после закрытия браузера
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Войти</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-muted">
                <p class="mb-0">Тестовый пользователь: <strong>user</strong> / <strong>qwerty</strong></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
